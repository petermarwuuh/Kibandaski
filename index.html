<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kibandaski — Order from your local kibanda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="sidebar">
    <h1 class="logo">Kibandaski</h1>
    <div class="sidebar-menus">
      <a href="index.html"><ion-icon name="storefront-outline"></ion-icon>Home</a>
      <a href="bills.html"><ion-icon name="receipt-outline"></ion-icon>My Orders</a>
      <a href="favorites.html"><ion-icon name="heart-outline"></ion-icon>Favourites</a>
      <a href="wallet.html"><ion-icon name="wallet-outline"></ion-icon>Wallet</a>
      <a href="notifications.html"><ion-icon name="notifications-outline"></ion-icon>Notifications</a>
      <a href="contact.html"><ion-icon name="chatbubbles-outline"></ion-icon>Contact Us</a>
      <a href="auth.html" id="admin-nav-link" style="display:none;"><ion-icon name="shield-checkmark-outline"></ion-icon>Admin</a>
    </div>
    <div class="sidebarlogout">
      <a href="logout.html"><ion-icon name="log-out-outline"></ion-icon>Logout</a>
    </div>
  </div>

  <div class="main">
    <div class="main-navbar">
      <ion-icon class="menu-toggle" name="menu-outline"></ion-icon>
      <div class="search">
        <input id="searchInput" type="text" placeholder="Unataka kukula nini?" />
        <button class="search-btn">Search</button>
      </div>
      <div class="profile">
        <a class="cart" href="cart.html"><ion-icon name="cart-outline"></ion-icon></a>
        <a class="user" href="auth.html"><ion-icon name="person-outline"></ion-icon></a>
      </div>
    </div>

    <div class="main-highlight">
      <div class="main-header">
        <h2 class="main-title">Recommendations</h2>
        <div class="main-arrow">
          <ion-icon class="back" name="chevron-back-circle-outline"></ion-icon>
          <ion-icon class="next" name="chevron-forward-circle-outline"></ion-icon>
        </div>
      </div>
      <div class="highlight-container">
        <div class="highlight-wrapper" id="highlightSlider"></div>
      </div>
    </div>

    <div class="vendor-bar">
      <h2 class="main-title">Local Vendors</h2>
      <div id="vendor-section" class="vendor-chips"></div>
    </div>

    <div class="main-menus">
      <div class="main-filter">
        <h2 class="main-title">Menu Category</h2>
        <div class="main-arrow">
          <ion-icon class="back-menus" name="chevron-back-circle-outline"></ion-icon>
          <ion-icon class="next-menus" name="chevron-forward-circle-outline"></ion-icon>
        </div>
        <div class="filter-wrapper">
          <div class="filter-card"><div class="filter-icon"><ion-icon name="restaurant-outline"></ion-icon></div><p>All Menus</p></div>
          <div class="filter-card"><div class="filter-icon"><ion-icon name="fast-food-outline"></ion-icon></div><p>Kuku</p></div>
          <div class="filter-card"><div class="filter-icon"><ion-icon name="nutrition-outline"></ion-icon></div><p>Nyama</p></div>
          <div class="filter-card"><div class="filter-icon"><ion-icon name="pizza-outline"></ion-icon></div><p>Chapati</p></div>
          <div class="filter-card"><div class="filter-icon"><ion-icon name="leaf-outline"></ion-icon></div><p>Ugali</p></div>
          <div class="filter-card"><div class="filter-icon"><ion-icon name="cafe-outline"></ion-icon></div><p>Kahawa</p></div>
          <div class="filter-card"><div class="filter-icon"><ion-icon name="fish-outline"></ion-icon></div><p>Samaki</p></div>
          <div class="filter-card"><div class="filter-icon"><ion-icon name="heart-outline"></ion-icon></div><p>Healthy</p></div>
        </div>
      </div>
      <hr class="divider" />
      <div class="main-detail">
        <h2 class="main-title">Choose Order</h2>
        <div class="detail-wrapper" id="menu-wrapper"></div>
      </div>
    </div>
  </div>

  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
