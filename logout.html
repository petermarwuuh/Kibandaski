<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logout — Kibandaski</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="main" style="padding: 3rem; margin-left: 0; text-align: center;">
    <h1 id="status">Logging out...</h1>
    <p>Thank you for using Kibandaski. Karibu tena!</p>
    <p><a href="index.html">Return to home</a></p>
  </div>

  <script type="module">
    import { signOut } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-auth.js";
    import { auth } from "./js/firebase-config.js";

    try {
      await signOut(auth);
    } catch {
      // User may not have been logged in
    }
    document.getElementById("status").textContent = "You have been logged out";
  </script>
</body>
</html>
