<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Cart — Kibandaski</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;800&display=swap" rel="stylesheet" />
  <style>
    .cart-item {
      display: flex;
      align-items: center;
      margin: 10px 0;
      justify-content: space-between;
      flex-wrap: wrap;
      background: #fff;
      padding: 1rem;
      border-radius: 8px;
    }
    .cart-img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      margin-right: 15px;
      border-radius: 10px;
    }
    .cart-info { flex-grow: 1; margin-right: 10px; }
    .quantity-control { display: flex; align-items: center; gap: 10px; }
    .quantity-control button {
      padding: 4px 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    .remove-btn {
      background-color: #ff4d4d;
      border: none;
      color: white;
      padding: 6px 12px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }
    .cart-summary { margin-top: 20px; font-size: 18px; font-weight: bold; }
    .checkout-btn {
      margin-top: 10px;
      padding: 10px 20px;
      background-color: var(--primarycolor);
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #444;
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      opacity: 0.9;
      z-index: 1000;
    }
    .empty-cart {
      text-align: center;
      padding: 3rem;
      background: #fff;
      border-radius: 8px;
    }
    .empty-cart a {
      color: var(--primarycolor);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="loading">Loading cart...</div>

  <div class="sidebar">
    <h1 class="logo">Kibandaski</h1>
    <div class="sidebar-menus">
      <a href="index.html"><ion-icon name="storefront-outline"></ion-icon>Home</a>
      <a href="bills.html"><ion-icon name="receipt-outline"></ion-icon>My Orders</a>
      <a href="wallet.html"><ion-icon name="wallet-outline"></ion-icon>Wallet</a>
      <a href="notifications.html"><ion-icon name="notifications-outline"></ion-icon>Notifications</a>
      <a href="contact.html"><ion-icon name="chatbubbles-outline"></ion-icon>Contact Us</a>
      <a href="add-food.html"><ion-icon name="shield-checkmark-outline"></ion-icon>Admin</a>
    </div>
    <div class="sidebarlogout">
      <a href="logout.html"><ion-icon name="log-out-outline"></ion-icon>Logout</a>
    </div>
  </div>

  <div class="main">
    <div class="main-navbar">
      <ion-icon class="menu-toggle" name="menu-outline"></ion-icon>
      <div class="profile">
        <a class="cart" href="cart.html"><ion-icon name="cart-outline"></ion-icon></a>
        <a class="user" href="auth.html"><ion-icon name="person-outline"></ion-icon></a>
      </div>
    </div>
    <div class="main-detal">
      <h2 class="main-title">My Cart</h2>
      <p id="item-count"></p>
      <div class="cart-wrapper"></div>
      <div class="cart-summary">
        <h3 id="cart-total">Total: Ksh. 0</h3>
        <p class="note">Estimated Delivery: 30–45 mins</p>
        <button class="checkout-btn" id="checkout-btn">Proceed to Checkout</button>
      </div>
    </div>
  </div>

  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  <script type="module" src="js/app.js"></script>
  <script type="module">
    import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js";
    import { db } from "./js/firebase-config.js";
    import { getOrCreateCartId, calculateDeliveryFee } from "./js/cart-utils.js";

    const cartId = getOrCreateCartId();

    const showToast = (msg) => {
      const toast = document.createElement("div");
      toast.className = "toast";
      toast.innerText = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    };

    const loadCart = async () => {
      const cartWrapper = document.querySelector(".cart-wrapper");
      const loading = document.getElementById("loading");
      const checkoutBtn = document.getElementById("checkout-btn");
      cartWrapper.innerHTML = "";
      loading.style.display = "block";

      const cartRef = doc(db, "carts", cartId);
      const cartSnap = await getDoc(cartRef);
      let total = 0;

      if (cartSnap.exists()) {
        const items = cartSnap.data().items || [];

        if (items.length === 0) {
          cartWrapper.innerHTML = `
            <div class="empty-cart">
              <p>Your cart is empty.</p>
              <p><a href="index.html">Browse the menu</a></p>
            </div>`;
          checkoutBtn.disabled = true;
        } else {
          checkoutBtn.disabled = false;
          items.forEach((food, index) => {
            const quantity = food.quantity || 1;
            const price = Number(food.price) * quantity;
            total += price;

            cartWrapper.innerHTML += `
              <div class="cart-item">
                <img src="${food.imageUrl}" alt="${food.name}" class="cart-img" />
                <div class="cart-info">
                  <h4>${food.name}</h4>
                  <p>${food.restaurant || ""}</p>
                  <p>Price: Ksh. ${food.price} x ${quantity} = <strong>Ksh. ${price}</strong></p>
                  <div class="quantity-control">
                    <button class="decrease" data-index="${index}">-</button>
                    <span>${quantity}</span>
                    <button class="increase" data-index="${index}">+</button>
                  </div>
                </div>
                <button class="remove-btn" data-index="${index}">Remove</button>
              </div>
            `;
          });

          document.querySelectorAll(".remove-btn").forEach((button) => {
            button.addEventListener("click", async (e) => {
              const idx = e.target.getAttribute("data-index");
              if (confirm("Remove this item from the cart?")) {
                items.splice(idx, 1);
                await updateDoc(cartRef, { items });
                showToast("Item removed");
                loadCart();
              }
            });
          });

          document.querySelectorAll(".increase").forEach((button) => {
            button.addEventListener("click", async (e) => {
              const idx = e.target.getAttribute("data-index");
              items[idx].quantity = (items[idx].quantity || 1) + 1;
              await updateDoc(cartRef, { items });
              showToast("Quantity increased");
              loadCart();
            });
          });

          document.querySelectorAll(".decrease").forEach((button) => {
            button.addEventListener("click", async (e) => {
              const idx = e.target.getAttribute("data-index");
              if ((items[idx].quantity || 1) > 1) {
                items[idx].quantity -= 1;
                await updateDoc(cartRef, { items });
                showToast("Quantity decreased");
                loadCart();
              }
            });
          });

          document.getElementById("item-count").innerText = `${items.length} item(s)`;
        }
      } else {
        cartWrapper.innerHTML = `
          <div class="empty-cart">
            <p>Your cart is empty.</p>
            <p><a href="index.html">Browse the menu</a></p>
          </div>`;
        checkoutBtn.disabled = true;
      }

      const deliveryFee = calculateDeliveryFee(total);
      const totalWithDelivery = total + deliveryFee;

      document.getElementById("cart-total").innerText =
        `Ksh. ${total} + Delivery (${deliveryFee}) = Ksh. ${totalWithDelivery}`;

      localStorage.setItem("deliveryFee", deliveryFee);
      localStorage.setItem("subtotal", total);
      localStorage.setItem("grandTotal", totalWithDelivery);

      loading.style.display = "none";
    };

    document.getElementById("checkout-btn").addEventListener("click", () => {
      window.location.href = "checkout.html";
    });

    window.addEventListener("DOMContentLoaded", loadCart);
  </script>
</body>
</html>
