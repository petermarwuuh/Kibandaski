<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Manage Food Items</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --primarycolor: #0e6253;
      --secondarycolor: #ffc107;
      --whitecolor: #fff;
      --blackcolor: #222;
      --softgreencolor: #d9f2ee;
      --darkgreycolor: #a7a7a7;
      --greycolor: #f5f5f5;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: var(--softgreencolor);
      color: var(--blackcolor);
      margin: 0;
      padding: 2rem;
    }

    h2 {
      text-align: center;
      color: var(--primarycolor);
    }

    form, .toggle-section {
      background-color: var(--whitecolor);
      padding: 2rem;
      border-radius: 12px;
      max-width: 600px;
      margin: 1rem auto;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    input[type="text"], input[type="number"], select {
      width: 100%;
      padding: 10px;
      margin-bottom: 1rem;
      border: 1px solid var(--darkgreycolor);
      border-radius: 8px;
      font-size: 1rem;
    }

    button {
      background-color: var(--primarycolor);
      color: var(--whitecolor);
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: var(--secondarycolor);
      color: var(--blackcolor);
    }

    .food-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--darkgreycolor);
      padding: 0.5rem 0;
    }

    .food-info {
      flex: 1;
    }

    .food-actions {
      display: flex;
      gap: 0.5rem;
    }

    .search-bar {
      margin: 1rem 0;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <h2>Kibandaski — Add / Manage Foods</h2>
  <p style="text-align:center;"><a href="index.html">← Back to home</a> | <a href="admin-orders.html">View orders</a></p>

  <form id="foodForm">
    <input type="text" id="name" placeholder="Food Name" required />
    <input type="text" id="description" placeholder="Description" required />
    <input type="number" id="price" placeholder="Price (Ksh)" required />
    <input type="text" id="imageUrl" placeholder="Image URL" required />
    <select id="restaurant" required>
      <option value="">Select Restaurant</option>
      <option value="Erick">Erick</option>
      <option value="Mama shamim">Mama Shamim</option>
      <option value="Oxygen">Oxygen</option>
      <option value="Zamzam">Zamzam</option>
      <option value="Oguna">Oguna</option>
      <option value="Rehoboth">Rehoboth</option>
      <option value="Mums">Mums</option>
    </select>
    <select id="category" required>
      <option value="">Select Category</option>
      <option value="Kuku">Kuku</option>
      <option value="Nyama">Nyama</option>
      <option value="Chapati">Chapati</option>
      <option value="Ugali">Ugali</option>
      <option value="Kahawa">Kahawa</option>
      <option value="Samaki">Samaki</option>
      <option value="Healthy">Healthy</option>
    </select>
    <input type="hidden" id="editId" />
    <button type="submit">Save Food</button>
  </form>

  <div class="toggle-section">
    <button id="toggleBtn">View Foods</button>
    <div id="foodSection" class="hidden">
      <div class="search-bar">
        <input type="text" id="search" placeholder="Search foods by name..." />
      </div>
      <div class="food-list" id="foodList"></div>
    </div>
  </div>

  <script type="module">
    import { collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js";
    import { db } from "./js/firebase-config.js";
    const foodCol = collection(db, "foods");

    const form = document.getElementById("foodForm");
    const foodList = document.getElementById("foodList");
    const searchInput = document.getElementById("search");
    const toggleBtn = document.getElementById("toggleBtn");
    const foodSection = document.getElementById("foodSection");

    // Toggle food list section
    toggleBtn.addEventListener("click", () => {
      foodSection.classList.toggle("hidden");
      toggleBtn.textContent = foodSection.classList.contains("hidden") ? "View Foods" : "Hide Foods";
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const name = form.name.value.trim();
      const description = form.description.value.trim();
      const price = parseFloat(form.price.value);
      const imageUrl = form.imageUrl.value.trim();
      const restaurant = form.restaurant.value;
      const category = form.category.value;
      const editId = form.editId.value;

      if (!name || !description || !price || !imageUrl || !restaurant || !category) return alert("Please fill all fields.");
      try { new URL(imageUrl); } catch { return alert("Invalid image URL."); }

      if (editId) {
        await updateDoc(doc(db, "foods", editId), { name, description, price, imageUrl, restaurant, category });
        alert("✅ Food updated.");
      } else {
        await addDoc(foodCol, { name, description, price, imageUrl, restaurant, category });
        alert("✅ Food added.");
      }
      form.reset();
    });

    const renderFoods = (foods) => {
      foodList.innerHTML = "";
      foods.forEach(docData => {
        const data = docData.data();
        const item = document.createElement("div");
        item.className = "food-item";
        item.innerHTML = `
          <div class="food-info">
            <strong>${data.name}</strong> - ${data.restaurant} (${data.category || "Uncategorized"})<br />
            Ksh ${data.price} - ${data.description}
          </div>
          <div class="food-actions">
            <button class="edit-btn" data-id="${docData.id}">Edit</button>
            <button onclick="deleteFood('${docData.id}')">Delete</button>
          </div>
        `;
        foodList.appendChild(item);
        item.querySelector(".edit-btn").addEventListener("click", () => {
          editFood(docData.id, data);
        });
      });
    };

    const editFood = (id, data) => {
      form.name.value = data.name;
      form.description.value = data.description;
      form.price.value = data.price;
      form.imageUrl.value = data.imageUrl;
      form.restaurant.value = data.restaurant;
      form.category.value = data.category || "";
      form.editId.value = id;
    };

    window.deleteFood = async (id) => {
      if (confirm("Are you sure you want to delete this food item?")) {
        await deleteDoc(doc(db, "foods", id));
        alert("Deleted.");
      }
    };

    let foodSnapshot = [];

    const updateDisplay = () => {
      const term = searchInput.value.toLowerCase();
      const filtered = foodSnapshot.filter(doc => doc.data().name.toLowerCase().includes(term));
      renderFoods(filtered);
    };

    searchInput.addEventListener("input", updateDisplay);

    onSnapshot(foodCol, (snapshot) => {
      foodSnapshot = snapshot.docs;
      updateDisplay();
    });
  </script>
</body>
</html>
