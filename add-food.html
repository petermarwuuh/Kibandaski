<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Manage Food Items — Kibandaski</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { padding: 2rem; }
    h2 { text-align: center; color: var(--primarycolor); }
    form, .toggle-section {
      background: #fff;
      padding: 2rem;
      border-radius: 12px;
      max-width: 600px;
      margin: 1rem auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    input, select { width: 100%; padding: 10px; margin-bottom: 1rem; border: 1px solid #ccc; border-radius: 8px; }
    button { background: var(--primarycolor); color: #fff; padding: 10px 16px; border: none; border-radius: 8px; cursor: pointer; }
    .food-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 0.75rem 0; }
    .hidden { display: none; }
    .vendor-badge { background: var(--secondarycolor); padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.85rem; }
  </style>
</head>
<body>
  <h2 id="pageTitle">Manage Foods</h2>
  <p style="text-align:center;">
    <a href="dashboard.html">← Dashboard</a> |
    <span id="roleBadge"></span>
  </p>

  <form id="foodForm">
    <input type="text" id="name" placeholder="Food Name" required />
    <input type="text" id="description" placeholder="Description" required />
    <input type="number" id="price" placeholder="Price (Ksh)" required />
    <input type="text" id="imageUrl" placeholder="Image URL" required />
    <select id="restaurant" required></select>
    <select id="category" required>
      <option value="">Select Category</option>
      <option value="Kuku">Kuku</option>
      <option value="Nyama">Nyama</option>
      <option value="Chapati">Chapati</option>
      <option value="Ugali">Ugali</option>
      <option value="Kahawa">Kahawa</option>
      <option value="Samaki">Samaki</option>
      <option value="Healthy">Healthy</option>
    </select>
    <input type="hidden" id="editId" />
    <button type="submit">Save Food</button>
  </form>

  <div class="toggle-section">
    <button id="toggleBtn">View Foods</button>
    <div id="foodSection" class="hidden">
      <input type="text" id="search" placeholder="Search foods..." style="margin-top:1rem;" />
      <div id="foodList"></div>
    </div>
  </div>

  <script type="module">
    import { collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js";
    import { db } from "./js/firebase-config.js";
    import { requireAuth } from "./js/auth-guard.js";
    import { isAdmin } from "./js/user-service.js";
    import { RESTAURANTS } from "./js/roles-config.js";

    const { profile } = await requireAuth({ roles: ["admin", "vendor"] });

    const foodCol = collection(db, "foods");
    const form = document.getElementById("foodForm");
    const restaurantSelect = document.getElementById("restaurant");
    const vendorRestaurant = profile.vendorRestaurant;

    document.getElementById("pageTitle").textContent = isAdmin(profile)
      ? "Admin — Manage All Foods"
      : `Vendor — ${vendorRestaurant} Menu`;

    document.getElementById("roleBadge").innerHTML = isAdmin(profile)
      ? '<span class="vendor-badge">Admin</span>'
      : `<span class="vendor-badge">Vendor: ${vendorRestaurant}</span>`;

    RESTAURANTS.forEach((r) => {
      if (isAdmin(profile) || r === vendorRestaurant) {
        const opt = document.createElement("option");
        opt.value = r;
        opt.textContent = r;
        restaurantSelect.appendChild(opt);
      }
    });

    if (!isAdmin(profile)) {
      restaurantSelect.value = vendorRestaurant;
      restaurantSelect.disabled = true;
    }

    document.getElementById("toggleBtn").addEventListener("click", () => {
      const section = document.getElementById("foodSection");
      section.classList.toggle("hidden");
      document.getElementById("toggleBtn").textContent =
        section.classList.contains("hidden") ? "View Foods" : "Hide Foods";
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const name = form.name.value.trim();
      const description = form.description.value.trim();
      const price = parseFloat(form.price.value);
      const imageUrl = form.imageUrl.value.trim();
      const restaurant = isAdmin(profile) ? form.restaurant.value : vendorRestaurant;
      const category = form.category.value;
      const editId = form.editId.value;

      if (!name || !description || !price || !imageUrl || !restaurant || !category) {
        return alert("Please fill all fields.");
      }

      if (editId) {
        await updateDoc(doc(db, "foods", editId), { name, description, price, imageUrl, restaurant, category });
        alert("Food updated.");
      } else {
        await addDoc(foodCol, { name, description, price, imageUrl, restaurant, category, avgRating: 0, ratingCount: 0 });
        alert("Food added.");
      }
      form.reset();
      if (!isAdmin(profile)) restaurantSelect.value = vendorRestaurant;
    });

    let foodSnapshot = [];

    function renderFoods(docs) {
      const list = document.getElementById("foodList");
      list.innerHTML = "";
      docs.forEach((docData) => {
        const data = docData.data();
        if (!isAdmin(profile) && data.restaurant !== vendorRestaurant) return;

        const item = document.createElement("div");
        item.className = "food-item";
        item.innerHTML = `
          <div>
            <strong>${data.name}</strong> — ${data.restaurant} (${data.category || "—"})<br />
            Ksh ${data.price} · ★ ${data.avgRating || 0} (${data.ratingCount || 0})
          </div>
          <div>
            <button class="edit-btn">Edit</button>
            <button class="del-btn">Delete</button>
          </div>
        `;
        item.querySelector(".edit-btn").addEventListener("click", () => {
          form.name.value = data.name;
          form.description.value = data.description;
          form.price.value = data.price;
          form.imageUrl.value = data.imageUrl;
          form.restaurant.value = data.restaurant;
          form.category.value = data.category || "";
          form.editId.value = docData.id;
        });
        item.querySelector(".del-btn").addEventListener("click", async () => {
          if (confirm("Delete this food?")) {
            await deleteDoc(doc(db, "foods", docData.id));
          }
        });
        list.appendChild(item);
      });
    }

    function updateDisplay() {
      const term = document.getElementById("search").value.toLowerCase();
      const filtered = foodSnapshot.filter((d) => d.data().name.toLowerCase().includes(term));
      renderFoods(filtered);
    }

    document.getElementById("search").addEventListener("input", updateDisplay);

    onSnapshot(foodCol, (snapshot) => {
      foodSnapshot = snapshot.docs;
      updateDisplay();
    });
  </script>
</body>
</html>
