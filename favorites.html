<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Favourites — Kibandaski</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="sidebar">
    <h1 class="logo">Kibandaski</h1>
    <div class="sidebar-menus">
      <a href="index.html"><ion-icon name="storefront-outline"></ion-icon>Home</a>
      <a href="bills.html"><ion-icon name="receipt-outline"></ion-icon>My Orders</a>
      <a href="favorites.html"><ion-icon name="heart-outline"></ion-icon>Favourites</a>
      <a href="cart.html"><ion-icon name="cart-outline"></ion-icon>Cart</a>
    </div>
    <div class="sidebarlogout">
      <a href="logout.html"><ion-icon name="log-out-outline"></ion-icon>Logout</a>
    </div>
  </div>

  <div class="main">
    <div class="main-navbar">
      <ion-icon class="menu-toggle" name="menu-outline"></ion-icon>
      <h2 style="padding:1rem;">My Favourites</h2>
    </div>
    <div style="padding:2rem;">
      <p>Foods you've saved. Tap the heart on any dish to add more.</p>
      <div id="fav-grid" class="detail-wrapper"></div>
    </div>
  </div>

  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script type="module" src="js/app.js"></script>
  <script type="module">
    import { getFavoriteFoods } from "./js/favorites-utils.js";
    import { renderStars } from "./js/ratings-utils.js";

    const grid = document.getElementById("fav-grid");

    async function load() {
      const foods = await getFavoriteFoods();
      if (!foods.length) {
        grid.innerHTML = `<p style="grid-column:1/-1;text-align:center;padding:2rem;">
          No favourites yet. <a href="index.html">Browse the menu</a> and tap ♥ on foods you love.
        </p>`;
        return;
      }

      grid.innerHTML = foods.map((food) => `
        <div class="detail-card" onclick="location.href='food-detail.html?id=${food.id}'">
          <img class="detail-img" src="${food.imageUrl}" alt="${food.name}" />
          <div class="detail-desc">
            <h4>${food.name}</h4>
            <p class="rating">${renderStars(food.avgRating || 0)} (${food.ratingCount || 0})</p>
            <p class="price">Ksh. ${food.price}</p>
            <p class="detail-sub">${food.restaurant || ""}</p>
          </div>
        </div>
      `).join("");
    }

    load();
  </script>
</body>
</html>
